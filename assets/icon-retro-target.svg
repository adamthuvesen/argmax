<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bgR4" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0d1a10"/>
      <stop offset="100%" stop-color="#020403"/>
    </radialGradient>
    <pattern id="scanR4" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="4" fill="rgba(0,0,0,0)"/>
      <rect y="4" width="8" height="4" fill="rgba(0,0,0,0.28)"/>
    </pattern>
    <filter id="glowR4" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="232" fill="url(#bgR4)"/>

  <!-- Pixel-aligned concentric squares (8-bit "rings"). 32px units. -->
  <g fill="none" stroke="#00ff41" stroke-width="32" filter="url(#glowR4)">
    <!-- Outer ring (dim) -->
    <rect x="208" y="208" width="608" height="608" opacity="0.32"/>
    <!-- Middle ring -->
    <rect x="336" y="336" width="352" height="352" opacity="0.6"/>
    <!-- Inner ring (brightest) -->
    <rect x="448" y="448" width="128" height="128"/>
  </g>

  <!-- Crosshair pixel ticks at four cardinals -->
  <g fill="#00ff41" filter="url(#glowR4)">
    <rect x="496" y="96" width="32" height="80"/>
    <rect x="496" y="848" width="32" height="80"/>
    <rect x="96" y="496" width="80" height="32"/>
    <rect x="848" y="496" width="80" height="32"/>
  </g>

  <!-- Pixel bullseye at center — the locked argmax -->
  <rect x="480" y="480" width="64" height="64" fill="#ffffff" filter="url(#glowR4)"/>

  <!-- Pixel corner brackets — like a viewfinder reticle -->
  <g fill="#00ff41" opacity="0.5">
    <rect x="160" y="160" width="64" height="16"/>
    <rect x="160" y="160" width="16" height="64"/>
    <rect x="800" y="160" width="64" height="16"/>
    <rect x="848" y="160" width="16" height="64"/>
    <rect x="160" y="848" width="64" height="16"/>
    <rect x="160" y="800" width="16" height="64"/>
    <rect x="800" y="848" width="64" height="16"/>
    <rect x="848" y="800" width="16" height="64"/>
  </g>

  <!-- Scanlines -->
  <rect width="1024" height="1024" rx="232" fill="url(#scanR4)"/>

  <rect x="1.5" y="1.5" width="1021" height="1021" rx="230.5"
        fill="none" stroke="rgba(0,255,65,0.15)" stroke-width="1.5"/>
</svg>
