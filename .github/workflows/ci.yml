name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint · typecheck · test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      # Cache the electron headers + electron-rebuild prebuilds so `rebuild:node`
      # (invoked by `npm test`) doesn't recompile better-sqlite3 / node-pty
      # from source on every run. Key on the native-module versions so a bump
      # of either package invalidates the cache automatically.
      - uses: actions/cache@v4
        with:
          path: |
            ~/.electron
            ~/.electron-gyp
            ~/.npm/_prebuilds
          key: ${{ runner.os }}-native-${{ hashFiles('package-lock.json') }}

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run check:bindings

      - run: npm run check:tauri-bridge

      - run: npm run test:rust

      # `npm test` runs `rebuild:node` first to rebuild better-sqlite3 and
      # node-pty against the host Node ABI before vitest starts.
      - run: npm test
        env:
          CI: "true"
