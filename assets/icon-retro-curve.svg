<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bgR3" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0a1410"/>
      <stop offset="100%" stop-color="#020403"/>
    </radialGradient>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="#00ff41" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <pattern id="scanR3" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="4" fill="rgba(0,0,0,0)"/>
      <rect y="4" width="8" height="4" fill="rgba(0,0,0,0.28)"/>
    </pattern>
    <filter id="glowR3" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="232" fill="url(#bgR3)"/>

  <!-- Oscilloscope grid (clipped to rounded corners) -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" fill="url(#grid)"/>

  <!-- Stepped pixel curve climbing to a peak, then descending.
       Each segment is a 64x32 block — a chunky waveform sample. -->
  <g fill="#00ff41" filter="url(#glowR3)">
    <rect x="128" y="704" width="64" height="32"/>
    <rect x="192" y="672" width="64" height="32"/>
    <rect x="256" y="608" width="64" height="32"/>
    <rect x="320" y="544" width="64" height="32"/>
    <rect x="384" y="448" width="64" height="32"/>
    <rect x="448" y="384" width="64" height="32"/>
    <!-- PEAK -->
    <rect x="480" y="320" width="64" height="32"/>
    <rect x="512" y="384" width="64" height="32"/>
    <rect x="576" y="448" width="64" height="32"/>
    <rect x="640" y="544" width="64" height="32"/>
    <rect x="704" y="608" width="64" height="32"/>
    <rect x="768" y="672" width="64" height="32"/>
    <rect x="832" y="704" width="64" height="32"/>
  </g>

  <!-- Apex marker: brighter block on top of the peak -->
  <rect x="480" y="288" width="64" height="32" fill="#ffffff" filter="url(#glowR3)"/>

  <!-- Dashed drop-line from peak to baseline (the argmax x) -->
  <line x1="512" y1="320" x2="512" y2="800"
        stroke="#00ff41" stroke-width="4" stroke-dasharray="8 12" opacity="0.55"/>

  <!-- X-axis tick at the argmax position -->
  <rect x="496" y="800" width="32" height="16" fill="#00ff41"/>

  <!-- Scanlines -->
  <rect width="1024" height="1024" rx="232" fill="url(#scanR3)"/>

  <rect x="1.5" y="1.5" width="1021" height="1021" rx="230.5"
        fill="none" stroke="rgba(0,255,65,0.15)" stroke-width="1.5"/>
</svg>
