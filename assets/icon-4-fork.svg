<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bg4" cx="50%" cy="30%" r="90%">
      <stop offset="0%" stop-color="#34302a"/>
      <stop offset="60%" stop-color="#1c1b18"/>
      <stop offset="100%" stop-color="#0a0908"/>
    </radialGradient>
    <linearGradient id="fork" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d8d3c6"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" rx="232" fill="url(#bg4)"/>
  <rect x="1.5" y="1.5" width="1021" height="1021" rx="230.5"
        fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>

  <!-- Trident fork: one trunk branching into three parallel worktrees -->
  <g stroke="url(#fork)" stroke-width="72" stroke-linecap="round" fill="none">
    <!-- Trunk (bottom center going up) -->
    <line x1="512" y1="780" x2="512" y2="560"/>
    <!-- Curve from trunk to left branch -->
    <path d="M 512 560 Q 512 460 280 460 L 280 244"/>
    <!-- Center branch -->
    <line x1="512" y1="560" x2="512" y2="244"/>
    <!-- Curve from trunk to right branch -->
    <path d="M 512 560 Q 512 460 744 460 L 744 244"/>
  </g>

  <!-- Three branch-head dots — each a different agent state -->
  <circle cx="280" cy="244" r="46" fill="#5a8f72"/>
  <circle cx="512" cy="244" r="46" fill="#f0ece1"/>
  <circle cx="744" cy="244" r="46" fill="#b08039"/>
</svg>
