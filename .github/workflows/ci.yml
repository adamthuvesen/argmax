name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint · typecheck · test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      # Cache the Cargo registry + `src-tauri/target` so `cargo test` doesn't
      # recompile the whole crate and its dependencies from scratch every run —
      # the single biggest cost in this job (~2m cold). Keyed on Cargo.lock.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run check:bindings

      - run: npm run check:tauri-bridge

      - run: npm run test:rust

      # Run the JS suites directly instead of `npm test`, which would re-run
      # `test:rust` a second time. The Rust tests already ran above.
      - run: npm run test:unit

      - run: npm run test:perf
