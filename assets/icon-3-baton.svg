<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bg3" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#2a2722"/>
      <stop offset="100%" stop-color="#0a0908"/>
    </radialGradient>
    <linearGradient id="baton" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#bdb6a7"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" rx="232" fill="url(#bg3)"/>
  <rect x="1.5" y="1.5" width="1021" height="1021" rx="230.5"
        fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>

  <!-- Conductor's baton: diagonal stroke from upper-left to lower-right -->
  <line x1="248" y1="296" x2="776" y2="728"
        stroke="url(#baton)" stroke-width="76" stroke-linecap="round"/>

  <!-- Three agents being conducted — dots arranged around the baton -->
  <!-- Top-right (sage = running) -->
  <circle cx="744" cy="296" r="44" fill="#5a8f72"/>
  <!-- Middle-right (amber = waiting) -->
  <circle cx="800" cy="488" r="36" fill="#b08039"/>
  <!-- Bottom-left (white = done) -->
  <circle cx="280" cy="728" r="44" fill="#f0ece1"/>
</svg>
