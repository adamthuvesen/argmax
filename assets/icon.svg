<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Inner SVG handles the 80% inset (102px padding each side) so the squircle rect stays at origin,
       avoiding a qlmanage rendering quirk where rounded rects with non-zero x/y silently drop. -->
  <svg x="102" y="102" width="820" height="820" viewBox="0 0 1024 1024">
    <rect width="1024" height="1024" rx="232" fill="#fefefe"/>
    <g transform="translate(104 206) scale(51)" fill="#9b6dd4" shape-rendering="crispEdges">
      <!-- row 0: antennae -->
      <rect x="4" y="0" width="1" height="1"/>
      <rect x="11" y="0" width="1" height="1"/>
      <!-- row 1: antennae -->
      <rect x="4" y="1" width="1" height="1"/>
      <rect x="11" y="1" width="1" height="1"/>
      <!-- row 2: head top -->
      <rect x="2" y="2" width="12" height="1"/>
      <!-- row 3: head -->
      <rect x="2" y="3" width="12" height="1"/>
      <!-- row 4: eye band (X at 2, 6-9, 13; eyes at 3-4 and 11-12 left transparent) -->
      <rect x="2" y="4" width="1" height="1"/>
      <rect x="6" y="4" width="4" height="1"/>
      <rect x="13" y="4" width="1" height="1"/>
      <!-- row 5: eye band repeat -->
      <rect x="2" y="5" width="1" height="1"/>
      <rect x="6" y="5" width="4" height="1"/>
      <rect x="13" y="5" width="1" height="1"/>
      <!-- row 6: head bottom -->
      <rect x="2" y="6" width="12" height="1"/>
      <!-- row 7: arms out (cols 0-1, 3-12, 14-15) -->
      <rect x="0" y="7" width="2" height="1"/>
      <rect x="3" y="7" width="10" height="1"/>
      <rect x="14" y="7" width="2" height="1"/>
      <!-- row 8: arms repeat -->
      <rect x="0" y="8" width="2" height="1"/>
      <rect x="3" y="8" width="10" height="1"/>
      <rect x="14" y="8" width="2" height="1"/>
      <!-- row 9: body bottom -->
      <rect x="2" y="9" width="12" height="1"/>
      <!-- row 10: legs (cols 1-2, 5-6, 9-10, 13-14) -->
      <rect x="1" y="10" width="2" height="1"/>
      <rect x="5" y="10" width="2" height="1"/>
      <rect x="9" y="10" width="2" height="1"/>
      <rect x="13" y="10" width="2" height="1"/>
      <!-- row 11: feet (cols 1, 6, 9, 14) -->
      <rect x="1" y="11" width="1" height="1"/>
      <rect x="6" y="11" width="1" height="1"/>
      <rect x="9" y="11" width="1" height="1"/>
      <rect x="14" y="11" width="1" height="1"/>
    </g>
  </svg>
</svg>
