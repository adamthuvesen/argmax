name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-tests:
    name: rust tests
    runs-on: macos-latest
    # macOS minutes bill at 10x, so keep only the Tauri/Rust lane here.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: dtolnay/rust-toolchain@stable

      # Cache the Cargo registry + `src-tauri/target` so `cargo test` doesn't
      # recompile the whole crate and its dependencies from scratch every run —
      # the single biggest cost in this job (~2m cold). Keyed on Cargo.lock.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm run test:rust

  js-checks:
    name: js lint · typecheck · tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run check:bindings

      - run: npm run check:tauri-bridge

      - run: npm run test:unit

      - run: npm run test:perf

  bundle-validation:
    name: bundle validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      # Build the renderer and assert its main chunk stays within budget so a
      # stray heavyweight import can't silently bloat cold-start payloads.
      - run: npm run build:renderer

      - run: npm run check:bundle

  ci:
    name: lint · typecheck · test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - rust-tests
      - js-checks
      - bundle-validation
    if: ${{ always() }}
    steps:
      - name: Verify required jobs passed
        run: |
          test "${{ needs.rust-tests.result }}" = "success"
          test "${{ needs.js-checks.result }}" = "success"
          test "${{ needs.bundle-validation.result }}" = "success"

  coverage-report:
    name: coverage report
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      # Report only: vitest.config.ts has no coverage thresholds, so coverage
      # numbers stay visible on main without extending the required PR lane.
      - run: npm run coverage

  dependency-audit:
    name: dependency audit
    # Cheap to run and platform-agnostic — keep it on Linux, not the 10x macOS runner.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      # Fail on high/critical advisories in dependencies that actually ship in
      # the renderer bundle. `--omit=dev` excludes the build/test toolchain
      # (vite, vitest, eslint, …), which never runs on a user's machine and
      # whose advisories can't be cleared without breaking-major bumps —
      # Dependabot tracks those separately for routine upgrades.
      - run: npm audit --omit=dev --audit-level=high

      - uses: dtolnay/rust-toolchain@stable

      # Prebuilt cargo-audit binary — avoids a from-source compile.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      # Audit the Tauri crate's lockfile against the RustSec advisory DB.
      - run: cargo audit --file src-tauri/Cargo.lock
