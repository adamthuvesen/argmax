name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint · typecheck · test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      # `npm test` runs `rebuild:node` first to rebuild better-sqlite3 and
      # node-pty against the host Node ABI before vitest starts.
      - run: npm test
        env:
          CI: "true"
